version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postflow
      POSTGRES_PASSWORD: postflow
      POSTGRES_DB: postflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postflow:postflow@postgres:5432/postflow?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "super-secret-jwt-key-change-in-production"
      PORT: 3000
      HOST: "0.0.0.0"
      NODE_ENV: "development"
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    command: ["node", "dist/workers/publish-post.worker.js"]
    environment:
      DATABASE_URL: "postgresql://postflow:postflow@postgres:5432/postflow?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "super-secret-jwt-key-change-in-production"
      PORT: 3000
      NODE_ENV: "development"
    depends_on:
      - postgres
      - redis

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./src/infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - promdata:/prometheus

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3030:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./src/infra/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./src/infra/grafana/datasources:/etc/grafana/provisioning/datasources
      - grafanadata:/var/lib/grafana

volumes:
  pgdata:
  redisdata:
  promdata:
  grafanadata:
